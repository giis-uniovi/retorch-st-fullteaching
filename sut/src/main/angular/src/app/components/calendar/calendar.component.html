<div class="calendar-container">
  <div class="row no-margin my-calendar-header">
    <div class="col l7 m7 s7 no-padding-lateral">
      <h3 class="calendar-title">{{ viewDate | calendarDate:(view + 'ViewTitle'):'en' }}</h3>
    </div>
    @if (!loadingSessions) {
      <div class="col l5 m5 s5 no-padding-lateral">
        <div class="calendar-icon-group">
          <button class="btn-flat no-padding-left calendar-nav-btn" (click)="decrement()" aria-label="Previous month"><i class="material-icons" aria-hidden="true">chevron_left</i></button>
          <button class="btn-flat calendar-nav-btn" (click)="today()" aria-label="Today"><i class="material-icons" aria-hidden="true">today</i></button>
          <button class="btn-flat calendar-nav-btn" (click)="increment()" aria-label="Next month"><i class="material-icons" aria-hidden="true">chevron_right</i></button>
        </div>
      </div>
    }
  </div>
  @if (!loadingSessions) {
    <div>
      <mwl-calendar-month-view [viewDate]="viewDate" [events]="events" [activeDayIsOpen]="activeDayIsOpen" (dayClicked)="dayClicked($event.day)"></mwl-calendar-month-view>
    </div>
  }
  @if (loadingSessions) {
    <div class="loader-calendar"></div>
  }
</div>
